/* ===================== PRIMITIVES ===================== */
function HealthBadge({ score, size="md" }) {
  const c = BANDS[bandOf(score)].c;
  const d = size==="lg" ? "h-16 w-16 text-2xl" : size==="sm" ? "h-7 w-7 text-xs" : "h-10 w-10 text-sm";
  return <div className={`${d} rounded-full grid place-items-center font-bold text-${c}-700 bg-${c}-100 ring-2 ring-${c}-200`}>{score}</div>;
}
const Dot = ({ score }) => <span className={`h-2.5 w-2.5 rounded-full bg-${BANDS[bandOf(score)].c}-500 inline-block`} />;
const Card = ({ children, className="" }) => <div className={`bg-white rounded-xl border border-slate-200 ${className}`}>{children}</div>;
function Tile({ label, value, delta }) {
  const up = typeof delta==="number" && delta>=0;
  return (
    <Card className="p-4 flex-1 min-w-[140px]">
      <div className="text-xs font-medium text-slate-500 uppercase tracking-wide">{label}</div>
      <div className="mt-1.5 flex items-end justify-between">
        <div className="text-2xl font-semibold text-slate-900">{value}</div>
        {typeof delta==="number" && <div className={`flex items-center gap-0.5 text-xs font-medium ${up?"text-emerald-600":"text-red-600"}`}>{up?<TrendingUp size={13}/>:<TrendingDown size={13}/>}{Math.abs(delta)}</div>}
      </div>
    </Card>
  );
}
const Pill = ({ children, tone="slate" }) => <span className={`px-2 py-0.5 rounded-full text-xs font-medium bg-${tone}-100 text-${tone}-700`}>{children}</span>;
const yoyTone = v => v == null ? "slate" : v >= 0 ? "emerald" : "red";
const yoyTxt = v => v == null ? "new" : (v>=0?"+":"")+v+"%";
const renTone = d => d<=14 ? "red" : d<=45 ? "amber" : "slate";

function BookGoalProgress() {
  const [open, setOpen] = useState(false);
  const pct = Math.round(BOOK.cy / BOOK.goal * 100);
  const top = [...CLIENTS].filter(c=>c.gap!=null).sort((a,b)=>b.gap-a.gap).slice(0,5);
  const bottom = [...CLIENTS].filter(c=>c.gap!=null).sort((a,b)=>a.gap-b.gap).slice(0,5);
  return (
    <div className="bg-slate-900 rounded-xl p-5 text-white">
      <button onClick={()=>setOpen(!open)} className="flex items-center gap-2 text-xs font-semibold text-slate-400 uppercase tracking-wide">
        Book Goal Progress · SY 2025–26 <ChevronRight size={13} className={`transition-transform ${open?"rotate-90":""}`}/> {open?"click to collapse":"click to expand"}
      </button>
      <div className="mt-3 flex items-start justify-between gap-6">
        <div className="flex-1">
          <div className="text-xl font-semibold">{M(BOOK.cy)} of {M(BOOK.goal)} goal <span className="text-slate-400 font-normal text-base">· YTD HTT Revenue</span></div>
          <div className="mt-3 h-2.5 bg-slate-700 rounded-full overflow-hidden"><div className="h-full bg-blue-500 rounded-full" style={{width:`${Math.min(pct,100)}%`}}/></div>
          <div className="mt-2 flex justify-between text-xs"><span className="text-slate-300 font-medium">{pct}% to goal</span><span className="text-slate-400">{fmt(BOOK.goal-BOOK.cy)} to close · {BOOK.daysLeft} days remaining in fiscal year</span></div>
        </div>
        <div className="flex gap-6 text-center shrink-0">
          <div><div className="text-2xl font-semibold text-emerald-400">{BOOK.over}</div><div className="text-[10px] text-slate-400 uppercase">Over goal<br/>customers</div></div>
          <div><div className="text-2xl font-semibold text-amber-400">{BOOK.under}</div><div className="text-[10px] text-slate-400 uppercase">Under goal<br/>customers</div></div>
        </div>
      </div>
      {open && (
        <div className="mt-4 pt-4 border-t border-slate-700 grid sm:grid-cols-2 gap-6">
          <div>
            <div className="text-xs font-semibold text-emerald-400 uppercase mb-2">Top over goal</div>
            {top.map(c=><div key={c.id} className="flex justify-between text-sm py-1"><span className="text-slate-300 truncate pr-2">{c.name}</span><span className="text-emerald-400 font-medium">+{c.gap}%</span></div>)}
          </div>
          <div>
            <div className="text-xs font-semibold text-amber-400 uppercase mb-2">Top under goal</div>
            {bottom.map(c=><div key={c.id} className="flex justify-between text-sm py-1"><span className="text-slate-300 truncate pr-2">{c.name}</span><span className="text-red-400 font-medium">{c.gap}%</span></div>)}
          </div>
        </div>
      )}
    </div>
  );
}

              <div key={s} className="flex items-center gap-2 text-sm">{on ? <CheckCircle2 size={15} className="text-emerald-500"/> : <Circle size={14} className="text-slate-300"/>}<span className={on?"text-slate-700":"text-slate-400"}>{s}</span></div>
